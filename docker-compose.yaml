services:
  atlantis:
    build: .  # мң„ Dockerfileмқҙ мһҲлҠ” кІҪлЎң
    container_name: iac-atlantis
    environment:
      # GitHub App м„Өм • (м•һм—җм„ң кө¬н•ң к°’л“Ө)
      - ATLANTIS_GH_APP_ID=${GITHUB_APP_ID}
      - ATLANTIS_GH_APP_KEY_FILE=/etc/atlantis/github-app.pem
      - ATLANTIS_GH_WEBHOOK_SECRET=${ATLANTIS_WEBHOOK_SECRET}
      # м ҖмһҘмҶҢ к¶Ңн•ң м„Өм •
      - ATLANTIS_REPO_ALLOWLIST=github.com/мғҒмңӨлӢҳID/*
      # AWS мһҗкІ© мҰқлӘ… (м„ңлІ„мқҳ IAM Roleмқ„ м“°кұ°лӮҳ нҷҳкІҪліҖмҲҳлЎң мЈјмһ…)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=ap-northeast-2
    volumes:
      - ./keys/github-app.pem:/etc/atlantis/github-app.pem
      - atlantis-data:/etc/atlantis/data
    # CoolifyлҘј м“ҙлӢӨл©ҙ м—¬кё°м—җ Traefik лқјлІЁмқ„ л¶ҷм—¬м„ң 80лІҲ нҸ¬нҠёлЎң м—°кІ°лҗҳкІҢ н•Ё
    networks:
      - iac-network

volumes:
  atlantis-data: # н…ҢлқјнҸј мғҒнғң нҢҢмқјкіј мәҗмӢңлҘј ліҙмЎҙн•ҳкё° мң„н•ҙ н•„мҲҳ!